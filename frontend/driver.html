<!DOCTYPE html>
<html>
<head>
<title>Driver Panel</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: linear-gradient(135deg, #0a192f, #020c1b);
    color: white;
}

.container {
    padding: 40px;
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>🚍 Driver Panel</h2>
    <p>Trip running automatically...</p>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<!DOCTYPE html>
<html>
<head>
<title>Live Bus Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- ✅ ROUTING -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #0f2027;
}

#map {
    height: 100vh;
}

/* TOP CARD */
.topCard {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 12px;
    color: white;
    z-index: 1000;
}

/* BOTTOM PANEL */
.bottomPanel {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 15px;
    color: white;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="topCard">
    🚍 <b id="busName">Bus</b><br>
    <span id="routeText">From → To</span>
</div>

<div id="map"></div>

<div class="bottomPanel">
    Speed: <span id="speed">--</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<!-- ✅ ROUTING -->
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script src="js/track.js"></script>



</body>
</html>
