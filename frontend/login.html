<!DOCTYPE html>
<html>

<head>
<title>Login - Smart Bus Connect</title>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="loginPage">

<div class="loginContainer">
<div class="loginCard">

<h2>Welcome Back</h2>
<p class="loginSubtitle">Login to Smart Bus Connect</p>

<form id="loginForm">

<input type="email" id="email" placeholder="Email Address" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit" class="primaryBtn">Login</button>

<p style="margin-top:10px;">
<button type="button" id="otpBtn" class="primaryBtn" style="background:#555;">
Login with OTP
</button>
</p>

<div id="otpSection" style="display:none;">
<input type="text" id="otpInput" placeholder="Enter OTP">
<button type="button" id="verifyOtpBtn" class="primaryBtn">
Verify OTP
</button>
</div>

<!-- 🔥 NEW TIMER -->
<p id="timerText" style="color:red;"></p>

<!-- 🔥 NEW RESEND BUTTON -->
<button type="button" id="resendBtn" class="primaryBtn" style="display:none;">
Resend OTP
</button>

<p class="registerText">
<a href="forgot.html">Forgot Password?</a>
</p>

</form>

<p id="error" class="formError"></p>
<p id="success" class="formSuccess"></p>

<p class="registerText">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("loginForm");
const otpBtn = document.getElementById("otpBtn");
const otpSection = document.getElementById("otpSection");
const verifyOtpBtn = document.getElementById("verifyOtpBtn");

let timer = 60;
let interval;

/* ================= LOGIN ================= */
form.addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

const error = document.getElementById("error");
const success = document.getElementById("success");

error.innerText="";
success.innerText="";

if(email==="" || password===""){
error.innerText="All fields are required";
return;
}

const response = await fetch("https://transitcloud-backend-service-production.onrender.com",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email, password })
});

const data = await response.json();

if(response.ok){
localStorage.setItem("token", data.token);
localStorage.setItem("user", JSON.stringify(data.user));

success.innerText = "Login successful";

setTimeout(()=>{
if(data.user.role === "admin"){
window.location.href = "admin/adminDashboard.html";
}else{
window.location.href = "home.html";
}
},1500);

}else{
error.innerText = data.message;
}

});


/* ================= TIMER FUNCTION ================= */
function startTimer(){

const timerText = document.getElementById("timerText");
const resendBtn = document.getElementById("resendBtn");

resendBtn.style.display = "none";

interval = setInterval(()=>{

timerText.innerText = `Resend OTP in ${timer}s`;
timer--;

if(timer < 0){
clearInterval(interval);
timerText.innerText = "";
resendBtn.style.display = "block";
}

},1000);
}


/* ================= SEND OTP ================= */
otpBtn.addEventListener("click", async ()=>{

const email = document.getElementById("email").value.trim();

if(!email){
alert("Enter email first");
return;
}

const res = await fetch("http://localhost:5000/api/auth/send-otp",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email })
});

const data = await res.json();

alert(data.message);

otpSection.style.display = "block";

timer = 60;
startTimer();

});


/* ================= RESEND OTP ================= */
document.getElementById("resendBtn").addEventListener("click", async ()=>{

const email = document.getElementById("email").value.trim();

await fetch("http://localhost:5000/api/auth/send-otp",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email })
});

timer = 60;
startTimer();

});


/* ================= VERIFY OTP ================= */
verifyOtpBtn.addEventListener("click", async ()=>{

const email = document.getElementById("email").value.trim();
const otp = document.getElementById("otpInput").value.trim();

const res = await fetch("http://localhost:5000/api/auth/verify-otp",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ email, otp })
});

const data = await res.json();

if(res.ok){
localStorage.setItem("token", data.token);
localStorage.setItem("user", JSON.stringify(data.user));
alert("OTP Login Successful");
window.location.href="home.html";
}else{
alert(data.message);
}

});

});

</script>
</body>
</html>
